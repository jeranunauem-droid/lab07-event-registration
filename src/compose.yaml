name: ${PROJECT_NAME}

services:
  # 1. ฐานข้อมูล (Database) - อยู่ในวง Backend เท่านั้น
  db-server:
    image: mysql:8.0
    container_name: ${MY_USERNAME}-db
    networks:
      - backend-zone
      - frontend-zone
    volumes:
      - db-storage:/var/lib/mysql
    secrets:
      - db_root_pass
      - db_user_pass
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_pass
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${MY_USERNAME}
      MYSQL_PASSWORD_FILE: /run/secrets/db_user_pass
    restart: always

  # 2. ส่วนประมวลผล (Backend) - เชื่อมต่อกับ DB และรับงานจาก Proxy
  backend-api:
    image: php:8.2-apache
    container_name: ${MY_USERNAME}-api
    networks:
      - backend-zone
      - frontend-zone
    volumes:
      - ./src:/var/www/html
    command:
    - sh
    - -c
    - |
      docker-php-ext-install mysqli
      apache2-foreground

  # 3. ส่วนรับงานหน้าบ้าน (Web Proxy) - อยู่ในวง Frontend
  web-proxy:
    image: nginx:latest
    container_name: ${MY_USERNAME}-web
    ports:
      - "${HTTP_PORT}:80"
    networks:
      - frontend-zone
    configs:
      - source: my-nginx-conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - backend-api

  # 4. ส่วนจัดการฐานข้อมูล (phpMyAdmin) - ต้องอยู่ทั้ง 2 วงเพื่อรับ User และคุยกับ DB
  db-management:
    image: phpmyadmin:latest
    container_name: ${MY_USERNAME}-pma
    ports:
      - "${PMA_PORT}:80"
    networks:
      - frontend-zone
      - backend-zone
    environment:
      PMA_HOST: db-server
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_pass

# --------------------------------------------------
# ส่วนประกาศทรัพยากรส่วนกลาง
# --------------------------------------------------
networks:
  frontend-zone:
    driver: bridge
  backend-zone:
    driver: bridge

volumes:
  db-storage:

configs:
  my-nginx-conf:
    file: ./nginx/my-nginx.conf

secrets:
  db_root_pass:
    file: ./secret/.db_root.txt
  db_user_pass:
    file: ./secret/.db_pass.txt