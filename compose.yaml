name: assignment-07

services:
  db-server:
    image: mysql:8.0
    container_name: ${MY_jeranun}-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: app_user
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_pass
      MYSQL_PASSWORD_FILE: /run/secrets/db_user_pass
    networks:
      - backend-zone
    volumes:
      - db-storage:/var/lib/mysql
    secrets:
      - db_root_pass
      - db_user_pass

  backend-php:
    image: bitnami/php-fpm:latest
    container_name: ${MY_jeranun}-php
    restart: always
    volumes:
      - ./app:/var/www/html
    networks:
      - backend-zone
    secrets:
      - db_user_pass

  web-proxy:
    image: nginx:latest
    container_name: ${MY_jeranun}-web
    restart: always
    ports:
      - "${HTTP_PORT}:80"
    volumes:
      - ./app:/var/www/html
    configs:
      - source: my-nginx-conf
        target: /etc/nginx/conf.d/default.conf
    networks:
      - frontend-zone
      - backend-zone
    depends_on:
      - backend-php

  db-management:
    image: phpmyadmin:latest
    container_name: ${MY_jeranun}-pma
    restart: always
    environment:
      PMA_HOST: db-server
      PMA_PASSWORD_FILE: /run/secrets/db_root_pass
    ports:
      - "${PMA_PORT}:80"
    networks:
      - frontend-zone
      - backend-zone
    depends_on:
      - db-server
    secrets:
      - db_root_pass

networks:
  frontend-zone:
    driver: bridge
  backend-zone:
    driver: bridge

volumes:
  db-storage:

configs:
  my-nginx-conf:
    file: ./nginx/my-nginx.conf

secrets:
  db_root_pass:
    file: ./secret/.db_root_pass.txt
  db_user_pass:
    file: ./secret/.db_user_pass.txt